apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable:  0
      maxSurge:  1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7-jammy
        ports:
        - containerPort: 27017
        resources:
          requests:
            cpu:  "100m"
            memory:  "256Mi"
          limits:
            cpu:  "250m"
            memory:  "512Mi"
        volumeMounts:
          - name: mongodb-iyas-data
            mountPath:  /data/db
      volumes:
        - name:  mongodb-iyas-data
          emptyDir:  
            sizeLimit:  "512Mi"


---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
 
 